name: tests-and-lint

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  tests-and-lint:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Start application
        run: |
          docker run --rm -d \
            --name task-manager \
            -p 5173:5173 \
            hexletprojects/qa_auto_python_testing_kanban_board_project_ru_app

      - name: Wait for application
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs task-manager
          exit 1

      - name: Run tests with coverage
        run: uv run pytest -v --cov=tests --cov-report=xml tests/
        env:
          APP_BASE_URL: http://localhost:5173

      - name: Stop application
        if: always()
        run: docker stop task-manager || true

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
